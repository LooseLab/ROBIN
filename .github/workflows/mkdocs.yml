# Build MkDocs and publish production docs to the gh-pages branch (site root).
#
# Beta docs from `release_candidate` deploy to /beta/ via mkdocs-beta.yml. Both workflows
# share concurrency `gh-pages-deploy` so they do not clobber each other.
#
# Repo Settings → Pages → Build and deployment: Source = "Deploy from a branch",
# Branch = gh-pages, folder = / (root). (If you still use "GitHub Actions" here, switch
# to branch deploy once this workflow is on the default branch.)

name: Publish docs

on:
  push:
    branches:
      - main
      - mkdocs
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --strict

      # Branch-based GitHub Pages may run Jekyll unless this file is present.
      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Deploy to GitHub Pages (production)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
          clean: true
          clean-exclude: |
            beta
